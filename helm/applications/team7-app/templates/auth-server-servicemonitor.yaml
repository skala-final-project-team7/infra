apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: team7-auth-server
  namespace: {{ .Values.global.namespace }}
  labels:
    app: auth-server
    app.kubernetes.io/name: auth-server
    app.kubernetes.io/instance: team7-auth-server
spec:
  selector:
    matchLabels:
      app: auth-server
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
      scrapeTimeout: 10s
