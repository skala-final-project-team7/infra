apiVersion: v1
kind: ConfigMap
metadata:
  name: bff-server-config
  namespace: {{ .Values.global.namespace }}
data:
  # Workload should consume:
  # envFrom:
  #   - configMapRef: { name: bff-server-config }
  #   - secretRef:    { name: bff-server-secret }
  #   - secretRef:    { name: app-connections-secret }   # infra-common
  ML_PIPELINE_BASE_URL: "http://<ml-pipeline-service>"
  ML_PIPELINE_TIMEOUT_MS: "30000"
  ML_PIPELINE_SSE_TIMEOUT_MS: "60000"
  ML_PIPELINE_HISTORY_TURNS: "10"
  DATA_INGESTION_BASE_URL: ""
  DATA_INGESTION_TIMEOUT_MS: "30000"
  AUTH_SERVER_BASE_URL: "https://<public-api-domain>"
  AUTH_SERVER_TIMEOUT_MS: "30000"
  LINA_JWT_ISSUER: "lina-auth-server"
  # 민감값은 bff-server-secret에서 관리.
  ADMIN_DASHBOARD_VECTOR_DB_SIZE: "0 B"
  ADMIN_DASHBOARD_MYSQL_ENABLED: "false"
  ADMIN_DASHBOARD_MYSQL_MAX_POOL_SIZE: "5"
  ADMIN_INGEST_EXCHANGE: "lina.admin.ingest"
  ADMIN_INGEST_ROUTING_KEY: "admin.ingest.requested"
  ADMIN_INGEST_QUEUE: "lina.data-ingestion.ingest"
  ADMIN_INGEST_DLQ: "lina.admin.ingest.dlq"
  ADMIN_INGEST_COMPLETION_QUEUE: "lina.admin.ingest.completion"
  ADMIN_INGEST_COMPLETION_DLQ: "lina.admin.ingest.completion.dlq"
  ADMIN_INGEST_COMPLETION_RETRY_MAX_ATTEMPTS: "5"
  ADMIN_INGEST_COMPLETION_RETRY_INITIAL_INTERVAL_MS: "1000"
  ADMIN_INGEST_COMPLETION_RETRY_MULTIPLIER: "2.0"
  ADMIN_INGEST_COMPLETION_RETRY_MAX_INTERVAL_MS: "10000"
