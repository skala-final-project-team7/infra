apiVersion: apps/v1
kind: Deployment
metadata:
  name: team7-bff-server
  namespace: {{ .Values.global.namespace }}
  labels:
    app: bff-server
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: bff-server
  template:
    metadata:
      labels:
        app: bff-server
    spec:
      imagePullSecrets:
{{- range .Values.global.imagePullSecrets }}
        - name: {{ . }}
{{- end }}
      containers:
        - name: bff-server
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.images.bffServer.repository }}:{{ .Values.images.bffServer.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: bff-server-config
            - secretRef:
                name: {{ .Values.secrets.bffServer }}
            - secretRef:
                name: {{ .Values.secrets.appConnections }}
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
