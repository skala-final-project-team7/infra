apiVersion: apps/v1
kind: Deployment
metadata:
  name: team7-ingestion-api
  namespace: {{ .Values.global.namespace }}
  labels:
    app: ingestion-api
    app.kubernetes.io/name: ingestion-api
    app.kubernetes.io/instance: team7-ingestion-api
    app.kubernetes.io/component: ingestion-api
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: ingestion-api
  template:
    metadata:
      labels:
        app: ingestion-api
        app.kubernetes.io/name: ingestion-api
        app.kubernetes.io/instance: team7-ingestion-api
        app.kubernetes.io/component: ingestion-api
    spec:
      imagePullSecrets:
{{- range .Values.global.imagePullSecrets }}
        - name: {{ . }}
{{- end }}
      containers:
        - name: ingestion-api
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.images.ingestionApi.repository }}:{{ .Values.images.ingestionApi.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: ingestion-config
            - secretRef:
                name: {{ .Values.secrets.ingestion }}
            - secretRef:
                name: {{ .Values.secrets.appConnections }}
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
