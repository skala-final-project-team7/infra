apiVersion: v2
name: data-stack
description: Data Layer for SKALA-Team-7 final project
type: application
version: 0.1.0
appVersion: "1.16.0"

dependencies:
  - name: mysql
    version: "14.0.3"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: mysql.enabled

  - name: mongodb
    version: "18.1.9"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: mongodb.enabled

  - name: rabbitmq
    version: "16.0.14"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: rabbitmq.enabled

  - name: qdrant
    version: "1.17.1"
    repository: "https://qdrant.github.io/qdrant-helm"
    condition: qdrant.enabled
