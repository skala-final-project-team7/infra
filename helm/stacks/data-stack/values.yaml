global:
  security:
    allowInsecureImages: true

mysql:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/mysql
    tag: 9.4.0-debian-12-r1
  auth:
    existingSecret: mysql-secret
    database: skala_team7
    username: skala
  primary:
    persistence:
      enabled: true
      size: 5Gi

mongodb:
  enabled: true
  architecture: standalone
  useStatefulSet: true
  image:
    registry: docker.io
    repository: bitnamilegacy/mongodb
    tag: 8.0.13-debian-12-r0
  auth:
    enabled: true
    existingSecret: mongodb-secret
    usernames:
      - skala
    databases:
      - skala_team7
  persistence:
    enabled: true
    size: 5Gi

rabbitmq:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/rabbitmq
    tag: 4.1.3-debian-12-r1
  auth:
    username: skala
    existingPasswordSecret: rabbitmq-secret
    existingErlangSecret: rabbitmq-erlang-secret
  persistence:
    enabled: true
    size: 5Gi

qdrant:
  enabled: true
  replicaCount: 1
  metrics:
    serviceMonitor:
      enabled: true
      scrapeInterval: 30s
      scrapeTimeout: 10s
      targetPort: http
      targetPath: /metrics
      authorization:
        type: Bearer
        credentials:
          name: qdrant-secret
          key: read-only-api-key
  apiKey:
    valueFrom:
    secretKeyRef:
      name: qdrant-secret
      key: api-key
  readOnlyApiKey:
    valueFrom:
      secretKeyRef:
        name: qdrant-secret
        key: read-only-api-key
  persistence:
    enabled: true
    size: 10Gi
