apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-auth-server
  namespace: skala3-finalproj-class2-team7
  labels:
    grafana_dashboard: "1"
data:
  auth-server-dashboard.json: |-
    {
      "annotations": {"list": [{"builtIn": 1, "datasource": {"type": "grafana", "uid": "-- Grafana --"}, "enable": true, "hide": true, "iconColor": "rgba(0, 211, 255, 1)", "name": "Annotations & Alerts", "type": "dashboard"}]},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {"datasource": {"type": "prometheus", "uid": "prometheus"}, "fieldConfig": {"defaults": {"mappings": [{"options": {"0": {"color": "red", "text": "DOWN"}, "1": {"color": "green", "text": "UP"}}, "type": "value"}], "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}, "overrides": []}, "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0}, "id": 1, "options": {"colorMode": "background", "graphMode": "none", "justifyMode": "center", "orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"}, "targets": [{"expr": "max(up{job=\"auth-server\", namespace=\"skala3-finalproj-class2-team7\"})", "legendFormat": "auth-server", "refId": "A"}], "title": "Status", "type": "stat"},
        {"datasource": {"type": "prometheus", "uid": "prometheus"}, "fieldConfig": {"defaults": {"unit": "reqps"}, "overrides": []}, "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0}, "id": 2, "options": {"colorMode": "value", "graphMode": "area", "justifyMode": "center", "orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"}, "targets": [{"expr": "sum(rate(http_server_requests_seconds_count{job=\"auth-server\", namespace=\"skala3-finalproj-class2-team7\", uri!=\"/actuator/prometheus\"}[5m]))", "legendFormat": "rps", "refId": "A"}], "title": "Request Rate", "type": "stat"},
        {"datasource": {"type": "prometheus", "uid": "prometheus"}, "fieldConfig": {"defaults": {"unit": "percentunit"}, "overrides": []}, "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0}, "id": 3, "options": {"colorMode": "value", "graphMode": "area", "justifyMode": "center", "orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"}, "targets": [{"expr": "sum(rate(http_server_requests_seconds_count{job=\"auth-server\", namespace=\"skala3-finalproj-class2-team7\", status=~\"4..|5..\", uri!=\"/actuator/prometheus\"}[5m])) / clamp_min(sum(rate(http_server_requests_seconds_count{job=\"auth-server\", namespace=\"skala3-finalproj-class2-team7\", uri!=\"/actuator/prometheus\"}[5m])), 1)", "legendFormat": "error rate", "refId": "A"}], "title": "Error Rate", "type": "stat"},
        {"datasource": {"type": "prometheus", "uid": "prometheus"}, "fieldConfig": {"defaults": {"unit": "s"}, "overrides": []}, "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0}, "id": 4, "options": {"colorMode": "value", "graphMode": "area", "justifyMode": "center", "orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"}, "targets": [{"expr": "sum(rate(http_server_requests_seconds_sum{job=\"auth-server\", namespace=\"skala3-finalproj-class2-team7\", uri!=\"/actuator/prometheus\"}[5m])) / clamp_min(sum(rate(http_server_requests_seconds_count{job=\"auth-server\", namespace=\"skala3-finalproj-class2-team7\", uri!=\"/actuator/prometheus\"}[5m])), 1)", "legendFormat": "avg latency", "refId": "A"}], "title": "Avg Latency", "type": "stat"},
        {"datasource": {"type": "prometheus", "uid": "prometheus"}, "fieldConfig": {"defaults": {"unit": "reqps"}, "overrides": []}, "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4}, "id": 5, "options": {"legend": {"calcs": ["lastNotNull"], "displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "single", "sort": "none"}}, "targets": [{"expr": "sum by (uri, status) (rate(http_server_requests_seconds_count{job=\"auth-server\", namespace=\"skala3-finalproj-class2-team7\", uri!=\"/actuator/prometheus\"}[5m]))", "legendFormat": "{{uri}} {{status}}", "refId": "A"}], "title": "Requests by URI / Status", "type": "timeseries"},
        {"datasource": {"type": "prometheus", "uid": "prometheus"}, "fieldConfig": {"defaults": {"unit": "bytes"}, "overrides": []}, "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4}, "id": 6, "options": {"legend": {"calcs": ["lastNotNull"], "displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "single", "sort": "none"}}, "targets": [{"expr": "sum by (area) (jvm_memory_used_bytes{job=\"auth-server\", namespace=\"skala3-finalproj-class2-team7\"})", "legendFormat": "{{area}}", "refId": "A"}], "title": "JVM Memory Used", "type": "timeseries"},
        {"datasource": {"type": "prometheus", "uid": "prometheus"}, "fieldConfig": {"defaults": {"unit": "percentunit"}, "overrides": []}, "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12}, "id": 7, "options": {"legend": {"calcs": ["lastNotNull"], "displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "single", "sort": "none"}}, "targets": [{"expr": "system_cpu_usage{job=\"auth-server\", namespace=\"skala3-finalproj-class2-team7\"}", "legendFormat": "{{pod}}", "refId": "A"}], "title": "System CPU Usage", "type": "timeseries"},
        {"datasource": {"type": "prometheus", "uid": "prometheus"}, "fieldConfig": {"defaults": {"unit": "short"}, "overrides": []}, "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12}, "id": 8, "options": {"legend": {"calcs": ["lastNotNull"], "displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "single", "sort": "none"}}, "targets": [{"expr": "sum by (pool) (hikaricp_connections_active{job=\"auth-server\", namespace=\"skala3-finalproj-class2-team7\"})", "legendFormat": "active {{pool}}", "refId": "A"}, {"expr": "sum by (pool) (hikaricp_connections_idle{job=\"auth-server\", namespace=\"skala3-finalproj-class2-team7\"})", "legendFormat": "idle {{pool}}", "refId": "B"}, {"expr": "sum by (pool) (hikaricp_connections_pending{job=\"auth-server\", namespace=\"skala3-finalproj-class2-team7\"})", "legendFormat": "pending {{pool}}", "refId": "C"}], "title": "HikariCP Connections", "type": "timeseries"}
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["team7", "application", "auth-server"],
      "templating": {"list": []},
      "time": {"from": "now-6h", "to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "title": "Team7 Auth Server",
      "uid": "team7-auth-server",
      "version": 1,
      "weekStart": ""
    }
