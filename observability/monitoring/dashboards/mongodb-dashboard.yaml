apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-mongodb-detail
  namespace: skala3-finalproj-class2-team7
  labels:
    grafana_dashboard: "1"
data:
  mongodb-detail.json: |-
    {
      "annotations": {"list": [{"builtIn": 1, "datasource": {"type": "grafana", "uid": "-- Grafana --"}, "enable": true, "hide": true, "iconColor": "rgba(0, 211, 255, 1)", "name": "Annotations & Alerts", "type": "dashboard"}]},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {"datasource": {"type": "prometheus", "uid": "prometheus"}, "fieldConfig": {"defaults": {"mappings": [{"options": {"0": {"color": "red", "text": "DOWN"}, "1": {"color": "green", "text": "UP"}}, "type": "value"}], "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}, "overrides": []}, "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0}, "id": 1, "options": {"colorMode": "background", "graphMode": "none", "justifyMode": "center", "orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"}, "targets": [{"expr": "mongodb_up{job=\"data-stack-mongodb-metrics\"}", "legendFormat": "MongoDB", "refId": "A"}], "title": "MongoDB Status", "type": "stat"},
        {"datasource": {"type": "prometheus", "uid": "prometheus"}, "fieldConfig": {"defaults": {"unit": "short"}, "overrides": []}, "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0}, "id": 2, "options": {"colorMode": "value", "graphMode": "area", "justifyMode": "center", "orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"}, "targets": [{"expr": "mongodb_ss_connections{job=\"data-stack-mongodb-metrics\",conn_type=\"current\"}", "legendFormat": "current", "refId": "A"}], "title": "Current Connections", "type": "stat"},
        {"datasource": {"type": "prometheus", "uid": "prometheus"}, "fieldConfig": {"defaults": {"unit": "ops"}, "overrides": []}, "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0}, "id": 3, "options": {"colorMode": "value", "graphMode": "area", "justifyMode": "center", "orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"}, "targets": [{"expr": "sum(rate(mongodb_ss_opcounters{job=\"data-stack-mongodb-metrics\"}[5m]))", "legendFormat": "ops/sec", "refId": "A"}], "title": "Operation Rate", "type": "stat"},
        {"datasource": {"type": "prometheus", "uid": "prometheus"}, "fieldConfig": {"defaults": {"unit": "decbytes"}, "overrides": []}, "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0}, "id": 4, "options": {"colorMode": "value", "graphMode": "area", "justifyMode": "center", "orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"}, "targets": [{"expr": "mongodb_ss_mem_resident{job=\"data-stack-mongodb-metrics\"} * 1024 * 1024", "legendFormat": "resident", "refId": "A"}], "title": "Resident Memory", "type": "stat"},
        {"datasource": {"type": "prometheus", "uid": "prometheus"}, "fieldConfig": {"defaults": {"unit": "short"}, "overrides": []}, "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4}, "id": 5, "options": {"legend": {"calcs": ["lastNotNull"], "displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "single", "sort": "none"}}, "targets": [{"expr": "mongodb_ss_connections{job=\"data-stack-mongodb-metrics\"}", "legendFormat": "{{conn_type}}", "refId": "A"}], "title": "Connections", "type": "timeseries"},
        {"datasource": {"type": "prometheus", "uid": "prometheus"}, "fieldConfig": {"defaults": {"unit": "ops"}, "overrides": []}, "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4}, "id": 6, "options": {"legend": {"calcs": ["lastNotNull"], "displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "single", "sort": "none"}}, "targets": [{"expr": "sum by (legacy_op_type) (rate(mongodb_ss_opcounters{job=\"data-stack-mongodb-metrics\"}[5m]))", "legendFormat": "{{legacy_op_type}}", "refId": "A"}, {"expr": "sum by (doc_op_type) (rate(mongodb_ss_metrics_document{job=\"data-stack-mongodb-metrics\"}[5m]))", "legendFormat": "document {{doc_op_type}}", "refId": "B"}], "title": "Operation Rate by Type", "type": "timeseries"},
        {"datasource": {"type": "prometheus", "uid": "prometheus"}, "fieldConfig": {"defaults": {"unit": "Bps"}, "overrides": []}, "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12}, "id": 7, "options": {"legend": {"calcs": ["lastNotNull"], "displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "single", "sort": "none"}}, "targets": [{"expr": "rate(mongodb_ss_network_bytesIn{job=\"data-stack-mongodb-metrics\"}[5m])", "legendFormat": "bytes in", "refId": "A"}, {"expr": "rate(mongodb_ss_network_bytesOut{job=\"data-stack-mongodb-metrics\"}[5m])", "legendFormat": "bytes out", "refId": "B"}], "title": "Network Throughput", "type": "timeseries"},
        {"datasource": {"type": "prometheus", "uid": "prometheus"}, "fieldConfig": {"defaults": {"unit": "short"}, "overrides": []}, "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12}, "id": 8, "options": {"legend": {"calcs": ["lastNotNull"], "displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "single", "sort": "none"}}, "targets": [{"expr": "mongodb_ss_globalLock_currentQueue{job=\"data-stack-mongodb-metrics\"}", "legendFormat": "queue {{count_type}}", "refId": "A"}, {"expr": "mongodb_ss_wt_cache_bytes_currently_in_the_cache{job=\"data-stack-mongodb-metrics\"}", "legendFormat": "cache bytes", "refId": "B"}], "title": "Lock Queue / WiredTiger Cache", "type": "timeseries"}
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["skala", "data-stack", "mongodb"],
      "templating": {"list": []},
      "time": {"from": "now-1h", "to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "title": "MongoDB Detail",
      "uid": "mongodb-detail",
      "version": 1,
      "weekStart": ""
    }
