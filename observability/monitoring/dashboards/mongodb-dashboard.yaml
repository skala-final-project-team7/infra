        {"datasource": {"type": "prometheus", "uid": "prometheus"}, "fieldConfig": {"defaults": {"unit": "short"}, "overrides": []}, "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0}, "id": 4, "options": {"colorMode": "value", "graphMode": "area", "justifyMode": "center", "orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"}, "targets": [{"expr": "mongodb_connections{job=\"data-stack-mongodb-metrics\",state=\"available\"}", "legendFormat": "available", "refId": "A"}], "title": "Available Connections", "type": "stat"},
        {"datasource": {"type": "prometheus", "uid": "prometheus"}, "fieldConfig": {"defaults": {"unit": "ops"}, "overrides": []}, "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4}, "id": 5, "options": {"legend": {"calcs": ["lastNotNull"], "displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "single", "sort": "none"}}, "targets": [{"expr": "sum by (type) (rate(mongodb_mongod_metrics_operation_total{job=\"data-stack-mongodb-metrics\"}[5m]))", "legendFormat": "{{type}}", "refId": "A"}], "title": "Operation Rate", "type": "timeseries"},
        {"datasource": {"type": "prometheus", "uid": "prometheus"}, "fieldConfig": {"defaults": {"unit": "short"}, "overrides": []}, "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4}, "id": 6, "options": {"legend": {"calcs": ["lastNotNull"], "displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "single", "sort": "none"}}, "targets": [{"expr": "mongodb_connections{job=\"data-stack-mongodb-metrics\"}", "legendFormat": "{{state}}", "refId": "A"}], "title": "Connections", "type": "timeseries"},
        {"datasource": {"type": "prometheus", "uid": "prometheus"}, "fieldConfig": {"defaults": {"unit": "short"}, "overrides": []}, "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12}, "id": 7, "options": {"legend": {"calcs": ["lastNotNull"], "displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "single", "sort": "none"}}, "targets": [{"expr": "mongodb_mongod_replset_member_health{job=\"data-stack-mongodb-metrics\"}", "legendFormat": "{{name}}", "refId": "A"}, {"expr": "mongodb_mongod_replset_my_state{job=\"data-stack-mongodb-metrics\"}", "legendFormat": "my state", "refId": "B"}], "title": "Replica Set Health / State", "type": "timeseries"},
        {"datasource": {"type": "prometheus", "uid": "prometheus"}, "fieldConfig": {"defaults": {"unit": "s"}, "overrides": []}, "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12}, "id": 8, "options": {"legend": {"calcs": ["lastNotNull"], "displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "single", "sort": "none"}}, "targets": [{"expr": "scrape_duration_seconds{job=\"data-stack-mongodb-metrics\"}", "legendFormat": "{{instance}}", "refId": "A"}], "title": "Scrape Duration", "type": "timeseries"}
