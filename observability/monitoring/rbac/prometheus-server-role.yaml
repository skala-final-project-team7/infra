apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: monitoring-prometheus-server-role
  namespace: skala3-finalproj-class2-team7
rules:
  - apiGroups:
      - ""
    resources:
      - services
      - endpoints
      - pods
      - configmaps
    verbs:
      - get
      - list
      - watch

  - apiGroups:
      - discovery.k8s.io
    resources:
      - endpointslices
    verbs:
      - get
      - list
      - watch

  - apiGroups:
      - ""
    resources:
      - secrets
    resourceNames:
      - qdrant-secret
    verbs:
      - get

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: monitoring-prometheus-server-rolebinding
  namespace: skala3-finalproj-class2-team7
subjects:
  - kind: ServiceAccount
    name: monitoring-kube-prometheus-prometheus
    namespace: skala3-finalproj-class2-team7
roleRef:
  kind: Role
  name: monitoring-prometheus-server-role
  apiGroup: rbac.authorization.k8s.io
