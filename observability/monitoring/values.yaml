crds:
  enabled: false

global:
  rbac:
    create: false

defaultRules:
  create: false

# kube-system / control-plane 대상 모니터링 비활성화
# namespaced Argo CD는 kube-system 리소스를 관리할 수 없으므로 모두 꺼둔다.
kubeApiServer:
  enabled: false

kubelet:
  enabled: false

kubeControllerManager:
  enabled: false

coreDns:
  enabled: false

kubeDns:
  enabled: false

kubeEtcd:
  enabled: false

kubeScheduler:
  enabled: false

kubeProxy:
  enabled: false

kubeEtcd:
  enabled: false

nodeExporter:
  enabled: false

kubeStateMetrics:
  enabled: false

# kube-state-metrics 비활성화
# cluster-wide 리소스 조회용 ClusterRole 생성을 피하기 위함.
kubeStateMetrics:
  enabled: false

kube-state-metrics:
  enabled: false
  rbac:
    create: false

# Prometheus Operator 설정
prometheusOperator:
  enabled: true

  admissionWebhooks:
    enabled: false

  rbac:
    create: false

  namespaces:
    releaseNamespace: true

  kubeletService:
    enabled: false

  kubeletEndpointsEnabled: false
  
  kubeletEndpointSliceEnabled: false

# Grafana 설정
grafana:
  enabled: true

  rbac:
    create: true
    namespaced: true

  sidecar:
    dashboards:
      enabled: true
      searchNamespace: skala3-finalproj-class2-team7
      resource: configmap

    datasources:
      enabled: true
      searchNamespace: skala3-finalproj-class2-team7
      resource: configmap

  admin:
    existingSecret: grafana-admin-secret
    userKey: admin-user
    passwordKey: admin-password

  service:
    type: ClusterIP

  ingress:
    enabled: false
    ingressClassName: nginx
    hosts:
      - grafana.team7.local
    path: /

  additionalDataSources:
    - name: Loki
      uid: loki
      type: loki
      access: proxy
      url: http://loki-gateway.skala3-finalproj-class2-team7.svc.cluster.local
      isDefault: false
    - name: Tempo
      uid: tempo
      type: tempo
      access: proxy
      url: http://tempo.skala3-finalproj-class2-team7.svc.cluster.local:3100
      isDefault: false
      jsonData:
        tracesToLogsV2:
          datasourceUid: loki
          spanStartTimeShift: "-5m"
          spanEndTimeShift: "5m"
          filterByTraceID: true
          filterBySpanID: false
        serviceMap:
          datasourceUid: prometheus

# Prometheus 설정
prometheus:
  enabled: true

  rbac:
    create: false

  prometheusSpec:
    retention: 7d

    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false

    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi

alertmanager:
  enabled: true

  alertmanagerSpec:
    secrets:
      - slack-webhook-secret

  config:
    global:
      resolve_timeout: 5m

    route:
      receiver: slack-data-stack
      group_by:
        - alertname
        - component
        - severity
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 1h

    receivers:
      - name: "null"

      - name: slack-data-stack
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/slack-webhook-secret/webhook-url
            send_resolved: true
            title: "[{{ .Status }}] {{ .CommonLabels.alertname }}"
            text: "{{ range .Alerts }}*Severity:* {{ .Labels.severity }}\n*Component:* {{ .Labels.component }}\n*Summary:* {{ .Annotations.summary }}\n*Description:* {{ .Annotations.description }}\n{{ end }}"

# node-exporter는 공용 클러스터에서 hostPort 충돌 가능성이 있으므로 비활성화
nodeExporter:
  enabled: false

prometheus-node-exporter:
  enabled: false

# Thanos도 사용하지 않음
thanosRuler:
  enabled: false
